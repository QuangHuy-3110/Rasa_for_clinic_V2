          - greet
          - goodbye
          - affirm
          - deny
          - book_appointment
          - request_doctor
          - provide_specialty
          - provide_date
          - provide_time
          # - provide_decription
          - choose_doctor_name
          - book_with_doctor
          - explain_specialty
          - ask_doctor_info
          - list_doctors_by_specialty
          - cancel_appointment
          # - provide_cancel_date
          - select_appointment
          - out_of_scope
          - search_prescription
          - request_latest_prescription
          - nlu_fallback # ← THÊM
          - ask_who_examined_me
          - list_all_doctors
          - ask_doctor_schedule
          - trigger_reminder_check_on_login
          - list_all_specialties
          - check_reexamination_date

  specialty:
    type: text
    influence_conversation: true
    mappings:
      - type: from_entity
        entity: specialty
      - type: from_entity
        entity: specialty
        intent: provide_specialty
      - type: custom
      - type: from_text
        not_intent: # ← THAY ĐỔI: Thêm nlu_fallback vào not_intent
          - greet
