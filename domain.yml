version: "3.1"

intents:
  - greet
  - goodbye
  - request_doctor
  - affirm
  - deny
  - provide_medical_info
  - book_with_doctor
  - book_appointment
  - provide_decription
  - provide_specialty
  - choose_doctor_name
  - provide_time
  - provide_date
  - explain_specialty
  - ask_doctor_info
  - list_doctors_by_specialty
  - cancel_appointment
  - select_appointment
