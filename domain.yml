  - nlu_fallback
  - out_of_scope
  - search_prescription # ← THÊM MỚI
  # - provide_prescription_date # ← THÊM MỚI
  - request_latest_prescription # ← THÊM MỚI
  - ask_who_examined_me # ← THÊM MỚI
  - list_all_doctors # ← THÊM MỚI
  - ask_doctor_schedule
  - trigger_reminder_check_on_login
  - cancel_specific_appointment
  - list_all_specialties
  - check_reexamination_date

entities:
  - symptom
  - specialty
  - doctor_name
  - appointment_time
  - decription
  - date
  - time
  - appointment_id
  - doctor_id
  - prescription_date # ← THÊM MỚI

slots:
  just_listed_all_specialties_dummy:
    type: bool
    initial_value: false
    influence_conversation: false
    mappings:
      - type: custom

  just_asked_doctor_schedule_dummy:
    type: bool
    initial_value: false
    influence_conversation: false
    mappings:
      - type: custom

  just_listed_all_doctors_dummy:
    type: bool
    initial_value: false
    influence_conversation: false
    mappings:
      - type: custom

  just_asked_examining_doctor: # ← THÊM MỚI
    type: bool
    initial_value: false
    influence_conversation: true
    mappings:
      - type: custom

  just_listed_doctors:
    type: bool
    initial_value: false
    influence_conversation: true
    mappings:
      - type: custom

  just_explained:
    type: bool
    initial_value: false
    influence_conversation: true
    mappings:
      - type: custom

  just_asked_doctor_info:
