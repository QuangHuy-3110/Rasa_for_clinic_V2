          - book_appointment
          - request_doctor
          - provide_specialty
          - provide_date
          - choose_doctor_name
          - provide_decription
          - provide_medical_info
          - provide_time
          - book_with_doctor
          - explain_specialty
          - ask_doctor_info
          - list_doctors_by_specialty
          - cancel_appointment
          # - provide_cancel_date
          - select_appointment
          - out_of_scope
          - search_prescription
          # - provide_date
          - request_latest_prescription
          - nlu_fallback # ← THÊM
          - ask_who_examined_me
          - list_all_doctors
          - ask_doctor_schedule
          - trigger_reminder_check_on_login
          - list_all_specialties
          - check_reexamination_date
      - type: custom

  decription:
    type: text
    influence_conversation: false
    mappings:
      - type: from_entity
        entity: decription
        intent: # ← THÊM: Hạn chế intent
          - provide_decription
          - provide_medical_info
      - type: from_text
        intent:
          - provide_decription
          - provide_medical_info
      - type: custom
      - type: from_text
        not_intent: # Trừ các intent điều hướng (để tránh bắt nhầm lệnh hủy/chào)
