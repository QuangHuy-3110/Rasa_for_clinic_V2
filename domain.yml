    initial_value: false
    influence_conversation: true
    mappings:
      - type: custom

  # symptoms:
  #   type: list
  #   influence_conversation: false
  #   mappings:
  #     - type: from_entity
  #       entity: symptom

  symptoms:
    type: text # Lưu dạng văn bản
    influence_conversation: false
    mappings:
      # Mapping quan trọng nhất: Lấy toàn bộ text người dùng nhập
      - type: from_text
        conditions:
          - active_loop: recommend_doctor_form # Chỉ lấy khi đang trong form này
        not_intent: # Trừ các intent điều hướng (để tránh bắt nhầm lệnh hủy/chào)
          - greet
          - goodbye
          - affirm
          - deny
          - book_appointment
          - request_doctor
          - provide_specialty
          - provide_date
          - provide_time
          - provide_decription
          - choose_doctor_name
          - book_with_doctor
          - explain_specialty
          - ask_doctor_info
          - list_doctors_by_specialty
          - cancel_appointment
          # - provide_cancel_date
          - select_appointment
          - out_of_scope
          - search_prescription
          - request_latest_prescription
          - nlu_fallback # ← THÊM
          - ask_who_examined_me
          - list_all_doctors
          - ask_doctor_schedule
          - trigger_reminder_check_on_login
          - list_all_specialties
          - check_reexamination_date

  doctor_id:
    type: text
    influence_conversation: false
    mappings:
      - type: custom

  current_task:
    type: categorical
    influence_conversation: true
    values:
      - request_doctor
      - book_appointment
      - cancel_appointment
      - search_prescription # ← THÊM MỚI
    mappings:
      - type: custom

  specialty_suggested:
    type: text
    influence_conversation: true
    mappings:
      - type: custom

  appointment_date:
    type: text
    influence_conversation: false
    mappings:
      - type: from_entity
        entity: date
        intent: # ← THÊM: Hạn chế intent để tránh set sai
          # - provide_cancel_date
          - provide_date
      - type: from_text
        intent:
          # - provide_cancel_date
          - provide_date
      - type: custom

  prescription_date:
    type: text
    influence_conversation: false
    mappings:
      - type: from_entity
        entity: prescription_date
        intent: provide_date # ← THAY ĐỔI: Thêm hạn chế intent
      - type: from_entity
        entity: date
        intent: provide_date
      - type: from_text
        intent: provide_date
      - type: custom
        not_intent: # ← THAY ĐỔI: Thêm nlu_fallback vào not_intent
          - greet
          - goodbye
          - affirm
          - deny
          - book_appointment
          - request_doctor
          - provide_specialty
          - provide_date
          - provide_time
          - provide_decription
          - provide_medical_info
          - choose_doctor_name
          - book_with_doctor
          - explain_specialty
          - ask_doctor_info
          - list_doctors_by_specialty
          - cancel_appointment
          # - provide_cancel_date
          - select_appointment
          - out_of_scope
          - search_prescription
          - request_latest_prescription
          - nlu_fallback # ← THÊM
          - ask_who_examined_me
          - list_all_doctors
          - ask_doctor_schedule
          - trigger_reminder_check_on_login
          - list_all_specialties
          - check_reexamination_date

  search_latest_prescription:
    type: bool
    initial_value: false
    influence_conversation: false
    mappings:
      - type: custom
        not_intent: # ← THAY ĐỔI: Thêm nlu_fallback vào not_intent
          - greet
          - goodbye
          - affirm
          - deny
          - book_appointment
          - request_doctor
          - provide_specialty
          - provide_date
          - provide_time
          - provide_decription
          - provide_medical_info
          - choose_doctor_name
          - book_with_doctor
          - explain_specialty
          - ask_doctor_info
          - list_doctors_by_specialty
          - cancel_appointment
          # - provide_cancel_date
          - select_appointment
          - out_of_scope
          - search_prescription
          # - provide_date
          - request_latest_prescription
          - nlu_fallback # ← THÊM
          - ask_who_examined_me
          - list_all_doctors
          - ask_doctor_schedule
          - trigger_reminder_check_on_login
          - list_all_specialties
          - check_reexamination_date

  doctor_name:
    type: text
    influence_conversation: true
    mappings:
      - type: from_entity
        entity: doctor_name
        intent:
          - choose_doctor_name
          - book_appointment # <-- THÊM DÒNG NÀY
      - type: custom
      - type: from_text
        not_intent: # ← THAY ĐỔI: Thêm nlu_fallback vào not_intent
          - greet
          - goodbye
          - affirm
          - deny
          - book_appointment
          - request_doctor
          - provide_specialty
          - provide_date
          - provide_time
          - provide_decription
          - provide_medical_info
          - choose_doctor_name
          - book_with_doctor
          - explain_specialty
          - ask_doctor_info
          - list_doctors_by_specialty
          - cancel_appointment
          # - provide_cancel_date
          - select_appointment
          - out_of_scope
          - search_prescription
          # - provide_date
          - request_latest_prescription
          - nlu_fallback # ← THÊM
          - ask_who_examined_me
          - list_all_doctors
          - ask_doctor_schedule
          - trigger_reminder_check_on_login
          - list_all_specialties
          - check_reexamination_date

  appointment_time:
    type: text
    influence_conversation: false
    mappings:
      - type: from_entity
        entity: appointment_time
        intent:
          - provide_time
          - book_appointment # <-- THÊM DÒNG NÀY
      - type: from_entity
        entity: time
        intent:
          - provide_time
          - book_appointment # <-- THÊM DÒNG NÀY
      - type: from_text
        not_intent: # ← THAY ĐỔI: Thêm nlu_fallback vào not_intent
