responses:
  utter_ask_price:
    - text: "Xin lỗi! Tôi không thể biết chính xác chi phí cho một lần khám là bao nhiêu, để biết rõ hơn về chi phí bạn có thể đến trực tiếp gặp bác sĩ phụ trách hoặc bộ phận tư vấn để biết thêm thông tin"

  utter_select_appointment:
    - text: "Vui lòng chọn mã số lịch hẹn bạn muốn hủy từ danh sách:"

  utter_greet:
    - text: |
        <div style="font-family: Arial, sans-serif; font-size: 15px; color: #333; background: #f8faff; border-radius: 10px; padding: 12px 14px; border: 1px solid #cce0ff;">
            <div style="font-weight: bold; color: #007bff; margin-bottom: 6px;">🤖 Xin chào!</div>
            <div>Tôi là <strong>chatbot hỗ trợ phòng khám</strong> 🏥.<br>
            Bạn cần tôi giúp gì hôm nay?</div>
        </div>
      buttons:
        - title: "🩺 Đề xuất bác sĩ"
          payload: "/request_doctor"
        - title: "📅 Đặt lịch hẹn"
          payload: "/book_appointment"
        - title: "❌ Hủy lịch hẹn"
          payload: "/cancel_appointment"
        - title: "💊 Tra cứu toa thuốc"
          payload: "/search_prescription"
        - title: "Ngày hẹn tái khám"
          payload: "/check_reexamination_date"
      metadata:
        html: true

  utter_goodbye:
    - text: "Tạm biệt! Chúc bạn sức khỏe."

  utter_out_of_scope:
    - text: |
        <div style="font-family: Arial, sans-serif; font-size: 15px; color: #333;
                    background: #fff8f8; border-left: 4px solid #dc3545; border-radius: 8px;
                    padding: 12px 14px; margin: 4px 0;">
            <div style="font-weight: bold; color: #dc3545; margin-bottom: 6px;">⚠️ Xin lỗi!</div>
            <div>Tôi chưa được đào tạo để trả lời câu hỏi này.</div>
            <div style="margin-top: 6px;">Hiện tôi có thể hỗ trợ bạn với:</div>
            <ul style="margin: 6px 0 0 18px; padding: 0;">
                <li>🩺 <strong>Đề xuất bác sĩ phù hợp</strong></li>
                <li>📅 <strong>Đặt lịch hẹn khám</strong></li>
                <li>❌ <strong>Hủy lịch hẹn</strong></li>
                <li>💊 <strong>Tra cứu toa thuốc</strong></li>
                <li>📋 <strong>Tra cứu thông tin bác sĩ và chuyên khoa</strong></li>
            </ul>
            <div style="margin-top: 8px;">👉 Bạn muốn tôi giúp gì trong số những việc trên không?</div>
        </div>
      buttons:
        - title: "🩺 Đề xuất bác sĩ"
          payload: "/request_doctor"
        - title: "📅 Đặt lịch hẹn"
          payload: "/book_appointment"
        - title: "💊 Tra cứu toa thuốc"
          payload: "/search_prescription"
        - title: "Ngày hẹn tái khám"
          payload: "/check_reexamination_date"
        - title: "🧑‍💼 Kết nối hỗ trợ viên"
          payload: "HANDOFF_TO_HUMAN"
      metadata:
        html: true

  # ← THÊM: Responses cho tìm toa thuốc
  utter_ask_prescription_option:
    - text: |
        <div style="font-family: Arial, sans-serif; font-size: 15px; color: #333;
                    background: #f0f8ff; border-left: 4px solid #17a2b8; border-radius: 8px;
                    padding: 12px 14px; margin: 4px 0;">
            <div style="font-weight: bold; color: #17a2b8; margin-bottom: 6px;">💊 Tra cứu toa thuốc</div>
            <div>Bạn muốn tìm toa thuốc như thế nào?</div>
        </div>
      buttons:
        - title: "📋 Toa thuốc mới nhất"
          payload: "/request_latest_prescription"
        - title: "📅 Theo ngày khám"
          payload: "/provide_date"
      metadata:
        html: true

  utter_ask_prescription_date:
    - text: "Vui lòng nhập ngày khám bạn muốn tra cứu toa thuốc (định dạng DD/MM/YYYY).\nVí dụ: 15/10/2025"

  utter_ask_symptoms:
    - text: "Bạn đang gặp triệu chứng gì? Hãy mô tả chi tiết (có thể liệt kê nhiều, ví dụ: 'đau đầu, sốt')."

  utter_ask_specialty:
    - text: "Bạn muốn khám chuyên khoa nào? \nCác chuyên khoa mà chúng tôi hỗ trợ bao gồm: nội khoa, ngoại khoa, nha khoa, phụ sản, nhi khoa, thần kinh. \nVui lòng nhập tên chuyên khoa."

  utter_explain_specialty:
    - text: "Bạn muốn tìm hiểu về chuyên khoa nào? Vui lòng nhập tên chuyên khoa."

  utter_ask_doctor_info:
    - text: "Bạn muốn xem thông tin của bác sĩ nào? Vui lòng nhập tên bác sĩ."

  utter_specialty_not_found:
    - text: "Chuyên khoa '{specialty}' không hợp lệ hoặc không có sẵn. Vui lòng chọn từ danh sách sau hoặc nhập lại:"

  utter_ask_doctor_name:
    - text: "Bạn muốn khám với bác sĩ nào? Vui lòng chọn hoặc nhập tên bác sĩ."

  utter_doctor_info:
    - text: "Bạn muốn tra cứu thông tin bác sĩ nào? Vui lòng nhập tên bác sĩ."

  utter_ask_appointment_time:
    - text: "Bạn muốn đặt lịch vào thời gian nào? Vui lòng cho biết thời gian cụ thể."

  utter_ask_decription:
    - text: "Hãy cho tôi biết thêm chi tiết về tình trạng của bạn."

  utter_ask_date:
    - text: "Bạn muốn đặt lịch vào ngày nào? Vui lòng cho biết ngày cụ thể."

  utter_ask_appointment_date:
    - text: "Vui lòng nhập ngày bạn muốn hủy lịch hẹn (định dạng DD/MM/YYYY)."

  utter_confirm:
    - text: |
        <div style="font-family: Arial, sans-serif; font-size: 15px; color: #333;
                    background: #f9fbff; border-left: 4px solid #007bff; border-radius: 8px;
                    padding: 12px 14px; margin: 4px 0;">
            <div style="font-weight: bold; color: #007bff; margin-bottom: 6px;">📅 Xác nhận đặt lịch</div>
            <div>Bạn có muốn <strong>đặt lịch với bác sĩ này</strong> không?</div>
        </div>
      buttons:
        - title: "✅ Có"
          payload: "/affirm"
        - title: "❌ Không"
          payload: "/deny"
      metadata:
        html: true

  utter_confirm_booking:
    - text: |
        <div style="font-family: Arial, sans-serif; font-size: 15px; color: #333;
                    background: #fffef5; border-left: 4px solid #ffc107; border-radius: 8px;
                    padding: 12px 14px; margin: 4px 0;">
            <div style="font-weight: bold; color: #ffb300; margin-bottom: 6px;">🩺 Xác nhận thông tin đặt lịch</div>
            <div><strong>Bác sĩ:</strong> {doctor_name}</div>
            <div><strong>Chuyên khoa:</strong> {specialty}</div>
            <div><strong>Thời gian:</strong> {appointment_time} ngày {date}</div>
            <div><strong>Mô tả bệnh trạng:</strong> "{decription}"</div>
            <div style="margin-top: 8px;">👉 Bạn có muốn xác nhận đặt lịch này không?</div>
        </div>
      buttons:
        - title: "✅ Có"
          payload: "/affirm"
        - title: "❌ Không"
          payload: "/deny"
      metadata:
        html: true

  utter_appointment_cancelled:
    - text: "Bạn đã hủy đặt lịch hẹn."

  utter_default_error:
    - text: "Có lỗi xảy ra. Vui lòng thử lại sau."

  utter_recommend_doctor_no_doctors:
    - text: "Không tìm thấy bác sĩ phù hợp với triệu chứng của bạn. Vui lòng thử mô tả khác."

  utter_recommend_doctor_success:
    - text: "Dựa trên triệu chứng, tôi gợi ý chuyên khoa: {specialty_suggested}."

  utter_ask_intent:
    - text: |
        <div style="font-family: Arial, sans-serif; font-size: 15px; color: #333;
                    background: #f8faff; border-left: 4px solid #007bff; border-radius: 8px;
                    padding: 12px 14px; margin: 4px 0;">
            <div style="font-weight: bold; color: #007bff; margin-bottom: 6px;">🤖 Bạn muốn làm gì tiếp theo?</div>
            <div>Vui lòng chọn một trong các tùy chọn bên dưới 👇</div>
        </div>
      buttons:
        - title: "🩺 Đề xuất bác sĩ"
          payload: "/request_doctor"
        - title: "📅 Đặt lịch hẹn"
          payload: "/book_appointment"
        - title: "❌ Hủy lịch hẹn"
          payload: "/cancel_appointment"
        - title: "💊 Tra cứu toa thuốc"
          payload: "/search_prescription"
      metadata:
        html: true

forms:
  cancel_appointment_form:
    required_slots:
      - appointment_date
      - selected_appointment_id

  recommend_doctor_form:
    required_slots:
      - symptoms

  book_appointment_form:
    required_slots:
      - doctor_name
      - specialty
      - date
      - appointment_time
      - decription

  # ← THÊM: Form tìm toa thuốc
  search_prescription_form:
    required_slots:
      - prescription_date

actions:
  - action_recommend_doctor
  - validate_recommend_doctor_form
  - action_book_with_doctor
  - action_set_current_task
  - validate_book_appointment_form
  - action_book_appointment
  - action_reactivate_book_form
